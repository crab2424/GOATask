services:
  db:
    image: postgres:16-alpine
    container_name: goatask-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: goatask
      POSTGRES_PASSWORD: goatask_dev
      POSTGRES_DB: goatask
    ports:
      - "5432:5432"
    volumes:
      - goatask_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goatask -d goatask"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  goatask_pgdata:
